<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Form Detection</title>
</head>
<body>
    <!-- 
      This is a "shadow" form used ONLY for Netlify's build-time bot detection.
      Since the site uses Next.js, this ensures Netlify registers the form 
      even if the JS-rendered version is tricky for the bot to find.
    -->
    <form name="contact-form" data-netlify="true" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
